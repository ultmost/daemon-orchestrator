  <rect width="600" height="150" rx="12" fill="url(#bg)"/>
  <text x="300" y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-1">daemon</text>
  <text x="300" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#a78bfa" letter-spacing="4" font-weight="500">ORCHESTRATOR</text>
